# nginx proxy address - http://172.17.0.1:60839

name: personaldrive
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  app:
    image: docker.io/personaldrive/personaldrive:latest
    container_name: personaldrive-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      DISABLE_HTTPS: false
      APP_TIMEZONE: ${TZ:-America/New_York}
      APP_URL: https://${BASE_HOST_NAME:-$HOSTNAME}
      CONTAINER_NAME: personaldrive-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
    ports:
      - '172.17.0.1:60839:80'
    volumes:
      - './volumes/config/personaldrive:/var/www/html/personal-drive/database/db:z'
      - './volumes/data/personaldrive:/var/www/html/personal-drive-storage-folder:z'
    healthcheck:
      test: timeout 10s bash -c ':> /dev/tcp/127.0.0.1/80' || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    networks:
      - personaldrive
      - proxy
      - cloudflare
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://personaldrive-app:80'
      - 'cloudflare.hostname=personaldrive.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.personaldrive-app.entrypoints=http'
      - 'traefik.http.routers.personaldrive-app-secure.tls=true'
      - 'traefik.http.routers.personaldrive-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.personaldrive-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.personaldrive-app.middlewares=personaldrive-app-https-redirect'
      - 'traefik.http.routers.personaldrive-app-secure.entrypoints=https'
      - 'traefik.http.routers.personaldrive-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.personaldrive-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.personaldrive-app-secure.service=personaldrive-app'
      - 'traefik.http.services.personaldrive-app.loadbalancer.server.port=80'

networks:
  personaldrive:
    name: personaldrive
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
